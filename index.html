<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>团队项目执行看板</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f8fafc; color: #1e293b; }
      .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
      .header { background: #fff; border-bottom: 1px solid #e2e8f0; }
      .header-inner { max-width: 1200px; margin: 0 auto; padding: 16px 24px; display: flex; justify-content: space-between; gap: 12px; align-items: center; }
      .title { margin: 0; font-size: 22px; }
      .subtitle { margin: 6px 0 0; color: #64748b; font-size: 14px; }
      .badge { background: #eff6ff; color: #1d4ed8; border-radius: 999px; padding: 6px 12px; font-size: 13px; }
      .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
      .tab { border: 1px solid #cbd5e1; background: #fff; color: #475569; padding: 8px 14px; border-radius: 10px; cursor: pointer; }
      .tab.active { border-color: #bfdbfe; background: #eff6ff; color: #1d4ed8; }
      .grid-4 { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 12px; }
      .card { border: 1px solid #e2e8f0; background: #fff; border-radius: 12px; padding: 16px; }
      .label { font-size: 13px; color: #64748b; }
      .value { margin-top: 6px; font-size: 28px; font-weight: 700; }
      .hint { margin-top: 4px; font-size: 12px; color: #94a3b8; }
      table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
      th, td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; text-align: left; font-size: 14px; }
      thead { background: #f8fafc; }
      .tag { display: inline-block; border-radius: 6px; padding: 2px 8px; font-size: 12px; }
      .st-进行中 { background: #eff6ff; color: #1d4ed8; }
      .st-未开始 { background: #f1f5f9; color: #475569; }
      .st-阻塞 { background: #fef2f2; color: #b91c1c; }
      .st-已完成 { background: #ecfdf5; color: #047857; }
      .rk-低 { background: #ecfdf5; color: #047857; }
      .rk-中 { background: #fffbeb; color: #b45309; }
      .rk-高 { background: #fff1f2; color: #be123c; }
      .gantt-list, .member-grid { display: grid; gap: 10px; }
      .gantt-item { display: grid; grid-template-columns: 260px 1fr; gap: 10px; align-items: center; }
      .timeline { height: 30px; background: #f1f5f9; border-radius: 8px; position: relative; }
      .bar { position: absolute; top: 4px; height: 22px; background: #3b82f6; color: #fff; border-radius: 6px; font-size: 12px; padding: 0 8px; line-height: 22px; white-space: nowrap; }
      .member-grid { grid-template-columns: repeat(2,minmax(0,1fr)); }
      .progress { height: 10px; background: #f1f5f9; border-radius: 999px; overflow: hidden; }
      .fill { height: 100%; }
      .ok { background: #10b981; }
      .warn { background: #f59e0b; }
      .danger { background: #ef4444; }
      @media (max-width: 900px){ .grid-4 { grid-template-columns: repeat(2,minmax(0,1fr)); } .gantt-item { grid-template-columns: 1fr; } .member-grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <div>
          <h1 class="title">团队项目执行看板</h1>
          <p class="subtitle">可离线打开 · 管理层总览（任务、排期、负荷、风险）</p>
        </div>
        <span class="badge">Sprint 03 · Mock 数据</span>
      </div>
    </header>

    <main class="container">
      <nav id="tabs" class="tabs"></nav>
      <section id="view"></section>
    </main>

    <script>
      const members = [
        { id: 'u1', name: '李华', role: '产品经理', capacity: 12 },
        { id: 'u2', name: '王敏', role: '前端工程师', capacity: 15 },
        { id: 'u3', name: '陈涛', role: '后端工程师', capacity: 16 },
        { id: 'u4', name: '赵楠', role: '测试工程师', capacity: 10 }
      ];

      const tasks = [
        { id: 'T-101', title: '需求梳理与范围确认', ownerId: 'u1', start: '2026-03-03', end: '2026-03-06', effort: 4, status: '已完成', risk: '低' },
        { id: 'T-102', title: '首页总览模块开发', ownerId: 'u2', start: '2026-03-07', end: '2026-03-12', effort: 6, status: '进行中', risk: '中' },
        { id: 'T-103', title: '任务清单接口与状态同步', ownerId: 'u3', start: '2026-03-08', end: '2026-03-14', effort: 7, status: '进行中', risk: '低' },
        { id: 'T-104', title: '甘特排期视图实现', ownerId: 'u2', start: '2026-03-11', end: '2026-03-18', effort: 7, status: '未开始', risk: '中' },
        { id: 'T-105', title: '成员负荷分析与预警', ownerId: 'u3', start: '2026-03-13', end: '2026-03-20', effort: 8, status: '未开始', risk: '高' },
        { id: 'T-106', title: '回归测试与发布验证', ownerId: 'u4', start: '2026-03-19', end: '2026-03-23', effort: 5, status: '未开始', risk: '中' }
      ];

      const pages = ['首页总览', '任务清单', '甘特排期', '成员负荷'];
      let current = pages[0];
      const viewEl = document.getElementById('view');
      const tabsEl = document.getElementById('tabs');

      const metrics = (() => {
        const effortTotal = tasks.reduce((s, t) => s + t.effort, 0);
        const riskyCount = tasks.filter((t) => t.risk === '高' || t.status === '阻塞').length;
        const completed = tasks.filter((t) => t.status === '已完成').length;
        const inProgress = tasks.filter((t) => t.status === '进行中').length;
        const memberLoad = members.map((m) => {
          const assigned = tasks.filter((t) => t.ownerId === m.id).reduce((s, t) => s + t.effort, 0);
          const saturation = +((assigned / m.capacity) * 100).toFixed(1);
          return { ...m, assigned, saturation };
        });
        return { effortTotal, riskyCount, completed, inProgress, memberLoad };
      })();

      const formatDate = (d) => new Date(d).toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
      const startBase = new Date(Math.min(...tasks.map((t) => new Date(t.start).getTime())));
      const endBase = new Date(Math.max(...tasks.map((t) => new Date(t.end).getTime())));
      const totalRange = Math.max(1, Math.ceil((endBase - startBase) / 86400000));

      function renderTabs() {
        tabsEl.innerHTML = pages.map((p) => `<button class="tab ${p === current ? 'active' : ''}" data-page="${p}">${p}</button>`).join('');
        tabsEl.querySelectorAll('button').forEach((btn) => btn.onclick = () => { current = btn.dataset.page; renderView(); renderTabs(); });
      }

      function renderOverview() {
        return `<div class="grid-4">
          <article class="card"><div class="label">项目总人天</div><div class="value">${metrics.effortTotal} 人天</div><div class="hint">自动汇总任务预估</div></article>
          <article class="card"><div class="label">高风险任务</div><div class="value">${metrics.riskyCount} 项</div><div class="hint">风险高或状态阻塞</div></article>
          <article class="card"><div class="label">进行中任务</div><div class="value">${metrics.inProgress} 项</div><div class="hint">当前正在推进</div></article>
          <article class="card"><div class="label">已完成任务</div><div class="value">${metrics.completed} 项</div><div class="hint">已交付项</div></article>
        </div>`;
      }

      function renderTasks() {
        return `<table><thead><tr><th>任务ID</th><th>任务名称</th><th>负责人</th><th>起止时间</th><th>人天</th><th>状态</th><th>风险</th></tr></thead>
          <tbody>${tasks.map((t) => `<tr>
            <td>${t.id}</td><td>${t.title}</td><td>${members.find((m) => m.id === t.ownerId).name}</td>
            <td>${formatDate(t.start)} - ${formatDate(t.end)}</td><td>${t.effort}</td>
            <td><span class="tag st-${t.status}">${t.status}</span></td>
            <td><span class="tag rk-${t.risk}">${t.risk}</span></td>
          </tr>`).join('')}</tbody></table>`;
      }

      function renderGantt() {
        return `<div class="card gantt-list">${tasks.map((t) => {
          const left = Math.ceil((new Date(t.start) - startBase) / 86400000) / totalRange * 100;
          const width = Math.max(1, Math.ceil((new Date(t.end) - new Date(t.start)) / 86400000)) / totalRange * 100;
          return `<div class="gantt-item"><div><strong>${t.title}</strong><div class="hint">${formatDate(t.start)} - ${formatDate(t.end)}</div></div>
          <div class="timeline"><div class="bar" style="left:${left}%;width:${width}%">${t.id}</div></div></div>`;
        }).join('')}</div>`;
      }

      function renderMembers() {
        return `<div class="member-grid">${metrics.memberLoad.map((m) => {
          const level = m.saturation > 95 ? 'danger' : m.saturation > 80 ? 'warn' : 'ok';
          const health = m.saturation > 95 ? '超负荷' : m.saturation > 80 ? '接近饱和' : '健康';
          return `<article class="card"><div style="display:flex;justify-content:space-between;align-items:baseline"><strong>${m.name}</strong><span class="label">${m.role}</span></div>
            <div style="margin:8px 0" class="label">任务负荷 ${m.assigned} / 可用容量 ${m.capacity} 人天</div>
            <div class="progress"><div class="fill ${level}" style="width:${Math.min(100,m.saturation)}%"></div></div>
            <div style="margin-top:8px;font-size:14px;font-weight:600">饱和度 ${m.saturation}% <span class="hint">${health}</span></div></article>`;
        }).join('')}</div>`;
      }

      function renderView() {
        if (current === '首页总览') viewEl.innerHTML = renderOverview();
        if (current === '任务清单') viewEl.innerHTML = renderTasks();
        if (current === '甘特排期') viewEl.innerHTML = renderGantt();
        if (current === '成员负荷') viewEl.innerHTML = renderMembers();
      }

      renderTabs();
      renderView();
    </script>
  </body>
</html>
